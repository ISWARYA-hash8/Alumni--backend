spring.application.name=AlumniPortal

# -----------------------------
# Server
# -----------------------------
server.port=${PORT:8080}
# -----------------------------
# MySQL Configuration
# -----------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/alumni_network_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# -----------------------------
# Redis Configuration
# -----------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=simple
app.cache.redis-enabled=false

# -----------------------------
# JWT Configuration
# -----------------------------
jwt.secret=${JWT_SECRET:Aqwertyuioplkjhgfdsazxcvbnmkloiuytrewsasdfghjkloiuytfrdsdfghjjhgfdsghjk}
jwt.expiration=86400000

# -----------------------------
# Logging
# -----------------------------
logging.level.org.springframework.security=DEBUG

# -----------------------------
# Frontend Redirects
# -----------------------------
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# # -----------------------------
# # Google OAuth2
# # # IMPORTANT: Set these environment variables in production:
# # GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REDIRECT_URI
# # ----
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8081/login/oauth2/code/google}
